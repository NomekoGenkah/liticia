services:
  postgres:
    # Aporta la extensión `vector`, requerida por LicitacionDocumentoChunk.embedding.
    # El sufijo -trixie NO es opcional: el tag `pg16` a secas es bookworm (glibc 2.36), y esta
    # BD se creó con postgres:16 (trixie, glibc 2.41). Bajar de glibc deja los índices B-tree de
    # texto ordenados con reglas que ya no coinciden con las del motor —"collation version
    # mismatch"—, lo que puede romper búsquedas y el UNIQUE de "Licitacion.codigoExterno".
    image: pgvector/pgvector:pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      OLLAMA_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
